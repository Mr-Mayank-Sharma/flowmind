services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowmind
      POSTGRES_PASSWORD: flowmind
      POSTGRES_DB: flowmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://flowmind:flowmind@postgres:5432/flowmind
      JWT_SECRET: ${JWT_SECRET:?Please set JWT_SECRET}
      AGENT_RUNTIME_URL: http://runtime:8001
      APP_URL: ${APP_URL:-http://localhost:4000}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  runtime:
    build:
      context: packages/agent-runtime
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      FLOWMIND_API_URL: http://api:3001
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
